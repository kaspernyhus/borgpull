[constants]
captain_data = "/captain/data"

[ssh]
host = "hetzner"                    # SSH alias or IP address
user = "root"                       # default: "root"
identity_file = "~/.ssh/borgpull"
port = 22

[borg]
repo = "ssh://borgbackup/vps-backups/caprover-django-apps"
socket_path = "/run/borg/hetzner.sock"
encryption = "none"                 # only used by `borgpull init`
compression = "lz4"                 # default: "lz4"
archive_name_format = "{hostname}-{now:%Y-%m-%dT%H:%M:%S}"  # default

[sources]
paths = [
    "{captain_data}/config-captain",
    "{captain_data}/nginx-shared",
    "/tmp/backup.sqlite3",
]
exclude = [
     "{captain_data}/config-captain/cache/",
]

[hooks]
before_create = [
    "sudo sqlite3 {captain_data}/caprover.sqlite3 '.backup /tmp/backup.sqlite3'",
]
after_create = [
    "sudo rm -f /tmp/backup.sqlite3",
]

[retention]
keep_daily = 7
keep_weekly = 4
keep_monthly = 6

[checks]
enabled = ["repository"]

[notifications]
on_failure = [
    "curl -s -d 'borgpull backup FAILED' ntfy.sh/my-topic",
]
on_success = [
    "curl -s -d 'borgpull backup OK' ntfy.sh/my-topic",
]
